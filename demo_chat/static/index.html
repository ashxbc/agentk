<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Chat — Reddit Lead Finder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid #1e1e1e;
    font-weight: 700;
    font-size: 15px;
    color: #ff6b6b;
    letter-spacing: 0.5px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bubble {
    max-width: 680px;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
  }

  .bubble.user {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    align-self: flex-end;
    color: #a0c4ff;
  }

  .bubble.assistant {
    background: #161616;
    border: 1px solid #2a2a2a;
    align-self: flex-start;
  }

  .bubble.status {
    background: transparent;
    border: none;
    color: #666;
    font-size: 13px;
    padding: 4px 0;
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: #ff6b6b;
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
    margin-top: 12px;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #666;
  }

  .badge {
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 2px 6px;
    color: #ff6b6b;
    font-size: 11px;
    font-weight: 600;
  }

  .card-title a {
    color: #e8e8e8;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
  }
  .card-title a:hover { color: #ff6b6b; }

  .stars { color: #f0a500; font-size: 13px; }

  .card-reason {
    font-size: 12px;
    color: #888;
    line-height: 1.4;
  }

  .card-stats {
    font-size: 11px;
    color: #555;
    display: flex;
    gap: 10px;
  }

  #input-bar {
    padding: 16px 24px;
    border-top: 1px solid #1e1e1e;
    display: flex;
    gap: 10px;
  }

  #msg {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 14px;
    color: #e8e8e8;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #msg:focus { border-color: #ff6b6b; }

  #send {
    background: #ff6b6b;
    color: #0d0d0d;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }
  #send:hover:not(:disabled) { opacity: 0.85; }
</style>
</head>
<body>
<header>🔍 Reddit Lead Finder</header>
<div id="chat"></div>
<div id="input-bar">
  <input id="msg" type="text" placeholder="e.g. I help SaaS founders with cold outreach..." autofocus>
  <button id="send">Find Leads</button>
</div>

<script>
const chat = document.getElementById('chat');
const msg  = document.getElementById('msg');
const send = document.getElementById('send');

let statusBubble = null;

function addBubble(cls, html) {
  const el = document.createElement('div');
  el.className = `bubble ${cls}`;
  el.innerHTML = html;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function setStatus(text) {
  if (!statusBubble) {
    statusBubble = addBubble('status', '');
  }
  statusBubble.innerHTML = `
    <div class="dots"><span></span><span></span><span></span></div>
    <span>${text}</span>
  `;
  chat.scrollTop = chat.scrollHeight;
}

function clearStatus() {
  if (statusBubble) {
    statusBubble.remove();
    statusBubble = null;
  }
}

function stars(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function renderResult(data) {
  clearStatus();

  // Summary bubble
  addBubble('assistant', `<strong>Summary</strong><br>${data.summary}`);

  // Cards
  if (!data.posts || data.posts.length === 0) return;

  const wrap = document.createElement('div');
  wrap.className = 'cards';

  data.posts.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-meta">
        <span class="badge">r/${p.subreddit}</span>
        <span>u/${p.author}</span>
      </div>
      <div class="card-title"><a href="${p.permalink}" target="_blank">${p.title}</a></div>
      <div class="stars">${stars(p.intent_score)}</div>
      <div class="card-reason">${p.intent_reason}</div>
      <div class="card-stats">
        <span>▲ ${p.score}</span>
        <span>💬 ${p.num_comments}</span>
      </div>
    `;
    wrap.appendChild(card);
  });

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

async function submit() {
  const text = msg.value.trim();
  if (!text) return;

  msg.value = '';
  send.disabled = true;
  statusBubble = null;

  addBubble('user', text);

  const resp = await fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text }),
  });

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });

    const parts = buf.split('\n\n');
    buf = parts.pop();

    for (const part of parts) {
      const line = part.trim();
      if (!line.startsWith('data: ')) continue;
      let evt;
      try { evt = JSON.parse(line.slice(6)); } catch { continue; }

      if (evt.type === 'status') {
        setStatus(evt.message);
      } else if (evt.type === 'result') {
        renderResult(evt);
      } else if (evt.type === 'error') {
        clearStatus();
        addBubble('assistant', `⚠️ ${evt.message}`);
      }
    }
  }

  send.disabled = false;
  msg.focus();
}

send.addEventListener('click', submit);
msg.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) submit(); });
</script>
</body>
</html>
